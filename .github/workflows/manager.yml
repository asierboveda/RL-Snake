name: Manager Orchestrator

on:
  workflow_dispatch:
    inputs:
      objective:
        description: "Objetivo global del ciclo RL"
        required: true
      max_iterations:
        description: "Número máximo de iteraciones manager-worker"
        required: false
        default: "3"
      base_branch:
        description: "Rama base para workers"
        required: false
        default: "main"
  repository_dispatch:
    # reacciona a los dos eventos para crear el ciclo manager -> worker -> manager -> worker
    types: [rl-metrics-ready, rl-implementation-ready]
  issues:
    types: [opened, labeled]

concurrency:
  group: manager-${{ github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  dispatch-workers:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'ai-dispatch'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve manager context
        id: ctx
        shell: bash
        run: |
          EVENT_NAME="${{ github.event_name }}"
          EVENT_ACTION=""
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            EVENT_ACTION="start"
            OBJECTIVE='${{ github.event.inputs.objective }}'
            ITERATION=1
            MAX_ITER='${{ github.event.inputs.max_iterations }}'
            BASE_BRANCH='${{ github.event.inputs.base_branch }}'
            TARGET_BRANCH='${{ github.event.inputs.base_branch }}'
            METRICS='{}'
            LOOP_MANAGER_RUN_ID='${{ github.run_id }}'
          elif [ "$EVENT_NAME" = "repository_dispatch" ]; then
            EVENT_ACTION="${{ github.event.action }}"
            OBJECTIVE='${{ github.event.client_payload.objective }}'
            ITERATION='${{ github.event.client_payload.next_iteration }}'
            MAX_ITER='${{ github.event.client_payload.max_iterations }}'
            BASE_BRANCH='${{ github.event.client_payload.base_branch }}'
            TARGET_BRANCH='${{ github.event.client_payload.branch_name }}'
            METRICS='${{ toJson(github.event.client_payload.runner_report) }}'
            LOOP_MANAGER_RUN_ID='${{ github.event.client_payload.manager_run_id }}'
            if [ -z "$LOOP_MANAGER_RUN_ID" ] || [ "$LOOP_MANAGER_RUN_ID" = "null" ]; then
              LOOP_MANAGER_RUN_ID='${{ github.run_id }}'
            fi
            # Metrics event on non-base branch means validation runner finished.
            # Manager owns merge and then continues next iteration from base branch.
            if [ "$EVENT_ACTION" = "rl-metrics-ready" ] && [ "$TARGET_BRANCH" != "$BASE_BRANCH" ]; then
              EVENT_ACTION="rl-validation-ready"
            fi
          else
            EVENT_ACTION="start"
            OBJECTIVE='${{ github.event.issue.title }} - ${{ github.event.issue.body }}'
            ITERATION=1
            MAX_ITER=3
            BASE_BRANCH='main'
            TARGET_BRANCH='main'
            METRICS='{}'
            LOOP_MANAGER_RUN_ID='${{ github.run_id }}'
          fi

          if [ -z "$OBJECTIVE" ]; then OBJECTIVE="Improve RL Snake agent"; fi
          OBJECTIVE=$(echo "$OBJECTIVE" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g')
          if [ -z "$ITERATION" ]; then ITERATION=1; fi
          if [ -z "$MAX_ITER" ]; then MAX_ITER=3; fi
          if [ -z "$BASE_BRANCH" ]; then BASE_BRANCH=main; fi
          if [ -z "$TARGET_BRANCH" ]; then TARGET_BRANCH="$BASE_BRANCH"; fi
          if [ -z "$METRICS" ]; then METRICS='{}'; fi
          METRICS_COMPACT=$(echo "$METRICS" | jq -c . 2>/dev/null || echo '{}')
          if [ -z "$METRICS_COMPACT" ] || [ "$METRICS_COMPACT" = "null" ]; then METRICS_COMPACT='{}'; fi

          echo "event_action=$EVENT_ACTION" >> "$GITHUB_OUTPUT"
          echo "objective=$OBJECTIVE" >> "$GITHUB_OUTPUT"
          echo "iteration=$ITERATION" >> "$GITHUB_OUTPUT"
          echo "max_iterations=$MAX_ITER" >> "$GITHUB_OUTPUT"
          echo "base_branch=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "target_branch=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"
          echo "runner_report_json=$METRICS_COMPACT" >> "$GITHUB_OUTPUT"
          echo "loop_manager_run_id=$LOOP_MANAGER_RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Merge validated implementation
        if: ${{ github.event_name == 'repository_dispatch' && steps.ctx.outputs.event_action == 'rl-validation-ready' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.ctx.outputs.target_branch }}"
          BASE="${{ steps.ctx.outputs.base_branch }}"
          if [ "$BRANCH" = "$BASE" ]; then
            echo "No merge needed: branch equals base."
            exit 0
          fi

          PR_NUMBER=$(gh pr list \
            --state open \
            --base "$BASE" \
            --head "$BRANCH" \
            --json number -q '.[0].number' 2>/dev/null || echo "")

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for $BRANCH -> $BASE (already merged or no-op)."
            exit 0
          fi

          gh pr merge "$PR_NUMBER" --squash --delete-branch

      - name: Run manager planner
        id: plan
        env:
          EVENT_ACTION: ${{ steps.ctx.outputs.event_action }}
          OBJECTIVE: ${{ steps.ctx.outputs.objective }}
          ITERATION: ${{ steps.ctx.outputs.iteration }}
          MAX_ITERATIONS: ${{ steps.ctx.outputs.max_iterations }}
          BASE_BRANCH: ${{ steps.ctx.outputs.base_branch }}
          TARGET_BRANCH: ${{ steps.ctx.outputs.target_branch }}
          RUNNER_REPORT_JSON: ${{ steps.ctx.outputs.runner_report_json }}
          MANAGER_RUN_ID: ${{ steps.ctx.outputs.loop_manager_run_id }}
        run: |
          PLAN_JSON=$(python .github/scripts/invoke_manager.py)
          echo "plan_json=$PLAN_JSON" >> "$GITHUB_OUTPUT"
          echo "$PLAN_JSON" | jq .

      - name: Dispatch tasks to worker workflow
        if: ${{ fromJson(steps.plan.outputs.plan_json).continue }}
        env:
          PLAN_JSON: ${{ steps.plan.outputs.plan_json }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$PLAN_JSON" | jq -c '.tasks[]' | while read -r task; do
            ROLE=$(echo "$task" | jq -r '.worker_role')
            BRANCH_NAME=$(echo "$task" | jq -r '.branch_name')
            BASE_BRANCH=$(echo "$task" | jq -r '.base_branch')
            INSTRUCTIONS=$(echo "$task" | jq -r '.instructions')
            REF=$(echo "$task" | jq -r '.ref')
            if [ -z "$REF" ] || [ "$REF" = "null" ]; then REF="$BASE_BRANCH"; fi

            gh workflow run worker.yml \
              --ref "$REF" \
              -f worker_role="$ROLE" \
              -f branch_name="$BRANCH_NAME" \
              -f base_branch="$BASE_BRANCH" \
              -f instructions="$INSTRUCTIONS" \
              -f objective="$(echo "$PLAN_JSON" | jq -r '.objective')" \
              -f iteration="$(echo "$PLAN_JSON" | jq -r '.iteration')" \
              -f max_iterations="$(echo "$PLAN_JSON" | jq -r '.max_iterations')" \
              -f manager_run_id="${{ steps.ctx.outputs.loop_manager_run_id }}"
          done

      - name: Persist manager trace
        if: always()
        continue-on-error: true
        run: |
          mkdir -p docs/ai-traces
          TRACE_FILE="docs/ai-traces/manager-${{ github.run_id }}.md"

          cat <<EOF > "$TRACE_FILE"
          # Manager Execution Trace (Run ID: ${{ github.run_id }})
          **Event:** ${{ github.event_name }}
          **Objective:** ${{ steps.ctx.outputs.objective }}
          **Iteration:** ${{ steps.ctx.outputs.iteration }} / ${{ steps.ctx.outputs.max_iterations }}
          **Base branch:** ${{ steps.ctx.outputs.base_branch }}

          ## Input metrics
          \`\`\`json
          ${{ steps.ctx.outputs.runner_report_json }}
          \`\`\`

          ## Generated plan
          \`\`\`json
          ${{ steps.plan.outputs.plan_json }}
          \`\`\`
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$TRACE_FILE"
          git commit -m "docs(ai-trace): manager run ${{ github.run_id }}" -m "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>" || exit 0
          for i in {1..5}; do
            git pull --rebase origin main && git push origin main && break || sleep $((RANDOM % 5 + 3))
          done
