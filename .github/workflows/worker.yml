name: Worker Execution

# Este workflow es invocado por el manager (manager.yml) para ejecutar uno de dos roles:
#
#   runner      -> Fase 1: Entrena el RLPlayer N episodios (headless, trainRL.py).
#                  Fase 2: Observa 30 partidas con run_and_observe.py.
#                    El observer registra en cada turno: acciones seguras disponibles,
#                    distancia al muro, distancia al enemigo, modo hunter/farmer.
#                    No solo cuenta muertes; diagnostica POR QUE muere el agente.
#                  Fase 3: Emite runner-report.json {metrics, diagnosis} al manager.
#
#   implementer -> Lee las instrucciones tecnicas del manager (basadas en el diagnostico
#                  del observer) y modifica RLPlayer.py con cambios atomicos.
#                  Hace commit en rama aislada y abre Pull Request.

on:
  workflow_dispatch:
    inputs:
      worker_role:
        description: "Role of worker (implementer|runner)"
        required: true
      branch_name:
        description: "Target branch for code changes"
        required: true
      base_branch:
        description: "Base branch to branch from"
        required: true
      instructions:
        description: "Specific manager instructions for this worker"
        required: true
      objective:
        description: "Shared objective from manager"
        required: true
      iteration:
        description: "Current loop iteration"
        required: true
      max_iterations:
        description: "Maximum loop iterations"
        required: true
      manager_run_id:
        description: "Run ID of manager orchestrator"
        required: true

jobs:
  execute-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # -----------------------------------------------------------------------
      # RUNNER WORKER
      # Fase 1: Entrenamiento headless (trainRL.py).
      # Fase 2: Observacion instrumentada por turno (run_and_observe.py).
      # -----------------------------------------------------------------------

      - name: Install Python dependencies (runner only)
        if: ${{ github.event.inputs.worker_role == 'runner' }}
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib --quiet

      - name: Cache Q-Table (runner only)
        if: ${{ github.event.inputs.worker_role == 'runner' }}
        uses: actions/cache@v4
        with:
          path: q_table_p0.pkl
          key: qtable-${{ github.event.inputs.manager_run_id }}-it${{ github.event.inputs.iteration }}
          restore-keys: |
            qtable-${{ github.event.inputs.manager_run_id }}-

      - name: Phase 1 - Training (headless, runner)
        if: ${{ github.event.inputs.worker_role == 'runner' }}
        # trainRL.py: sin matplotlib, sin PIL, puro bucle de juego.
        # Entrena el agente y guarda q_table_p0.pkl en disco.
        run: |
          python -u trainRL.py --episodes 80

      - name: Phase 2 - Observation and diagnosis (runner)
        if: ${{ github.event.inputs.worker_role == 'runner' }}
        # run_and_observe.py: evalua 30 partidas con epsilon=0, training_enabled=False.
        # En cada turno registra: cuantas acciones seguras habia, distancia al muro,
        # distancia al enemigo mas cercano, modo hunter/farmer.
        # Analiza patrones: ¿tenia alternativas cuando murio? ¿se mete en callejones?
        # Genera runner-report.json con seccion 'metrics' + seccion 'diagnosis'.
        # La seccion 'diagnosis' incluye un 'problem_code' y 'findings' narrativos
        # que el manager usa para decidir que cambiar en RLPlayer.py.
        run: |
          python -u .github/scripts/run_and_observe.py ${{ github.event.inputs.iteration }} \
            | tee worker-runner-output.log

      - name: Parse and expose runner report
        if: ${{ github.event.inputs.worker_role == 'runner' }}
        id: metrics
        run: |
          REPORT=$(jq -c . runner-report.json 2>/dev/null || echo '{}')
          echo "runner_report=$REPORT" >> "$GITHUB_OUTPUT"

      - name: Upload runner artifacts
        if: ${{ github.event.inputs.worker_role == 'runner' }}
        uses: actions/upload-artifact@v4
        with:
          name: runner-results-${{ github.run_id }}-it${{ github.event.inputs.iteration }}
          path: |
            worker-runner-output.log
            runner-report.json
            q_table_p0.pkl

      # -----------------------------------------------------------------------
      # IMPLEMENTER WORKER
      # Lee instrucciones del manager y modifica RLPlayer.py.
      # Cada ciclo trabaja en una rama aislada para que el runner del siguiente
      # ciclo pueda validar el cambio antes de que se mergee.
      # -----------------------------------------------------------------------

      - name: Setup implementer branch
        if: ${{ github.event.inputs.worker_role == 'implementer' }}
        run: |
          git fetch origin "${{ github.event.inputs.base_branch }}"
          git checkout "${{ github.event.inputs.base_branch }}"
          git checkout -B "${{ github.event.inputs.branch_name }}"

      - name: Run implementer worker (modify RLPlayer.py)
        if: ${{ github.event.inputs.worker_role == 'implementer' }}
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT != '' && secrets.COPILOT_PAT || secrets.GITHUB_TOKEN }}
        # El prompt incluye:
        #   1. El perfil del agente implementer (rl-worker.md).
        #   2. El contenido actual de RLPlayer.py (para que el LLM sepa el codigo base).
        #   3. Las instrucciones concretas del manager (metodo, argumento, que NO tocar).
        #   4. Los findings narrativos del observer (evidencia real del comportamiento).
        # Usa 'gh copilot suggest' para obtener una respuesta en modo codigo.
        run: |
          AGENT_FILE=".github/agents/rl-worker.md"
          RLPLAYER_CURRENT="RLPlayer.py"

          if [ ! -f "$AGENT_FILE" ]; then
            echo "ERROR: Missing agent profile $AGENT_FILE"
            exit 1
          fi
          if [ ! -f "$RLPLAYER_CURRENT" ]; then
            echo "ERROR: Missing source file $RLPLAYER_CURRENT"
            exit 1
          fi

          cat "$AGENT_FILE" > implementer_prompt.txt
          cat <<'PROMPTEOF' >> implementer_prompt.txt

          # CODIGO ACTUAL DE RLPlayer.py
          ```python
          PROMPTEOF
          cat "$RLPLAYER_CURRENT" >> implementer_prompt.txt
          cat <<'PROMPTEOF' >> implementer_prompt.txt
          ```

          # INSTRUCCIONES DEL MANAGER (basadas en diagnostico del observer)
          PROMPTEOF
          cat <<EOF >> implementer_prompt.txt
          Iteracion: ${{ github.event.inputs.iteration }}/${{ github.event.inputs.max_iterations }}
          Objetivo: ${{ github.event.inputs.objective }}

          ${{ github.event.inputs.instructions }}

          # TAREA
          Genera el contenido COMPLETO y ACTUALIZADO de RLPlayer.py con exactamente
          los cambios indicados. Un unico bloque python con el archivo completo.
          Sin texto explicativo fuera del bloque de codigo.
          EOF

          gh extension install github/gh-copilot 2>/dev/null || true
          gh copilot suggest -t shell "$(cat implementer_prompt.txt)" > raw_response.txt 2>&1 || \
            gh copilot explain "$(cat implementer_prompt.txt)" > raw_response.txt 2>&1 || true

          sed -n '/^```\(python\|py\)/,/^```$/p' raw_response.txt | grep -v '^```' > extracted_rlplayer.py || true
          if [ -s extracted_rlplayer.py ]; then
            echo "Implementer: bloque Python extraido ($(wc -l < extracted_rlplayer.py) lineas)."
            mv extracted_rlplayer.py RLPlayer.py
          else
            echo "WARN: No se pudo extraer bloque Python. El implementer no realizo cambios."
            cat raw_response.txt
          fi

      - name: Write implementation trace
        if: ${{ github.event.inputs.worker_role == 'implementer' }}
        run: |
          mkdir -p docs/ai-traces
          TRACE_FILE="docs/ai-traces/impl-it${{ github.event.inputs.iteration }}.md"
          cat <<EOF > "$TRACE_FILE"
          # Implementer Trace - Iteracion ${{ github.event.inputs.iteration }}
          **Branch:** ${{ github.event.inputs.branch_name }}
          **Manager run:** ${{ github.event.inputs.manager_run_id }}

          ## Objetivo
          ${{ github.event.inputs.objective }}

          ## Instrucciones del manager
          ${{ github.event.inputs.instructions }}

          ## Archivos modificados
          - RLPlayer.py
          EOF

      - name: Commit and push implementation changes
        if: ${{ github.event.inputs.worker_role == 'implementer' }}
        run: |
          git add RLPlayer.py docs/ai-traces/ || true
          if ! git diff-index --quiet HEAD; then
            git commit \
              -m "feat(ai-impl): mejora RL iteracion ${{ github.event.inputs.iteration }}" \
              -m "Manager run: ${{ github.event.inputs.manager_run_id }}" \
              -m "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            git push --force-with-lease -u origin "${{ github.event.inputs.branch_name }}"
          else
            echo "Sin cambios para commitear."
          fi

      - name: Create or update implementation PR
        if: ${{ github.event.inputs.worker_role == 'implementer' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list \
            --base "${{ github.event.inputs.base_branch }}" \
            --head "${{ github.event.inputs.branch_name }}" \
            --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --title "[AI-IMPL it${{ github.event.inputs.iteration }}] ${{ github.event.inputs.branch_name }}" \
              --body "**Manager run:** ${{ github.event.inputs.manager_run_id }}
          **Iteracion:** ${{ github.event.inputs.iteration }}/${{ github.event.inputs.max_iterations }}

          ### Instrucciones del manager
          ${{ github.event.inputs.instructions }}

          > Este PR no debe mergearse hasta que el runner del siguiente ciclo valide las metricas." \
              --base "${{ github.event.inputs.base_branch }}" \
              --head "${{ github.event.inputs.branch_name }}" || true
          else
            gh pr comment "$EXISTING_PR" \
              --body "Nuevo commit del implementer (iteracion ${{ github.event.inputs.iteration }}, manager ${{ github.event.inputs.manager_run_id }})." || true
          fi

      # -----------------------------------------------------------------------
      # FEEDBACK AL MANAGER
      # Ambos workers notifican al manager via repository_dispatch al terminar.
      # El runner envia el reporte completo {metrics, diagnosis}.
      # El implementer envia señal de que los cambios estan listos para validar.
      # -----------------------------------------------------------------------

      - name: Send runner report to manager
        if: ${{ github.event.inputs.worker_role == 'runner' && always() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUNNER_REPORT: ${{ steps.metrics.outputs.runner_report }}
        run: |
          NEXT_ITER=$(( ${{ github.event.inputs.iteration }} + 1 ))
          REPORT_PAYLOAD=${RUNNER_REPORT:-'{}'}

          jq -cn \
            --arg objective "${{ github.event.inputs.objective }}" \
            --argjson next_iteration "$NEXT_ITER" \
            --arg max_iterations "${{ github.event.inputs.max_iterations }}" \
            --arg base_branch "${{ github.event.inputs.base_branch }}" \
            --arg manager_run_id "${{ github.event.inputs.manager_run_id }}" \
            --arg branch_name "${{ github.event.inputs.branch_name }}" \
            --argjson runner_report "$REPORT_PAYLOAD" \
            '{event_type:"rl-metrics-ready",client_payload:{
              objective:$objective,
              next_iteration:$next_iteration,
              max_iterations:($max_iterations|tonumber),
              base_branch:$base_branch,
              manager_run_id:$manager_run_id,
              branch_name:$branch_name,
              runner_report:$runner_report
            }}' \
            | gh api repos/${{ github.repository }}/dispatches --method POST --input -

      - name: Send implementation signal to manager
        if: ${{ github.event.inputs.worker_role == 'implementer' && always() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT_ITER=$(( ${{ github.event.inputs.iteration }} + 1 ))

          jq -cn \
            --arg objective "${{ github.event.inputs.objective }}" \
            --argjson next_iteration "$NEXT_ITER" \
            --arg max_iterations "${{ github.event.inputs.max_iterations }}" \
            --arg base_branch "${{ github.event.inputs.base_branch }}" \
            --arg manager_run_id "${{ github.event.inputs.manager_run_id }}" \
            --arg branch_name "${{ github.event.inputs.branch_name }}" \
            '{event_type:"rl-implementation-ready",client_payload:{
              objective:$objective,
              next_iteration:$next_iteration,
              max_iterations:($max_iterations|tonumber),
              base_branch:$base_branch,
              manager_run_id:$manager_run_id,
              branch_name:$branch_name,
              runner_report:{}
            }}' \
            | gh api repos/${{ github.repository }}/dispatches --method POST --input -

      # -----------------------------------------------------------------------
      # TRAZABILIDAD
      # -----------------------------------------------------------------------

      - name: Persist worker trace
        if: always()
        continue-on-error: true
        run: |
          git fetch origin main
          git checkout main
          mkdir -p docs/ai-traces
          TRACE_FILE="docs/ai-traces/worker-${{ github.event.inputs.worker_role }}-${{ github.run_id }}.md"
          cat <<EOF > "$TRACE_FILE"
          # Worker Trace (Run ID: ${{ github.run_id }})
          **Role:** ${{ github.event.inputs.worker_role }}
          **Branch:** ${{ github.event.inputs.branch_name }}
          **Manager run:** ${{ github.event.inputs.manager_run_id }}
          **Iteracion:** ${{ github.event.inputs.iteration }} / ${{ github.event.inputs.max_iterations }}
          **Status:** ${{ job.status }}

          ## Instrucciones recibidas
          ${{ github.event.inputs.instructions }}
          EOF

          git add "$TRACE_FILE"
          git commit \
            -m "docs(ai-trace): worker ${{ github.event.inputs.worker_role }} run ${{ github.run_id }}" \
            -m "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>" || exit 0
          for i in {1..5}; do
            git pull --rebase origin main && git push origin main && break || sleep $((RANDOM % 5 + 3))
          done
